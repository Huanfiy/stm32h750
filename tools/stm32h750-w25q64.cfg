# OpenOCD configuration for STM32H750VB + external W25Q64JV @ QUADSPI bank 1.
#
# Pinout (matches CubeMX project / bootloader):
#   PB2  AF9   QSPI_CLK
#   PB6  AF10  QSPI_BK1_NCS
#   PD11 AF9   QSPI_BK1_IO0
#   PD12 AF9   QSPI_BK1_IO1
#   PE2  AF9   QSPI_BK1_IO2
#   PD13 AF9   QSPI_BK1_IO3
#
# Usage:
#   openocd -f tools/stm32h750-w25q64.cfg \
#           -c "program build/rt-thread.bin 0x90000000 verify reset exit"

source [find interface/jlink.cfg]
transport select swd
adapter speed 4000

set CHIPNAME stm32h750vb
source [find target/stm32h7x.cfg]
set _TARGETNAME $CHIPNAME.cpu0

proc qspi_init {} {
    # ---- enable peripheral clocks (RCC) ----
    # AHB4ENR |= GPIOBEN(bit1) | GPIODEN(bit3) | GPIOEEN(bit4)
    mmw 0x580244E0 0x0000001A 0
    # AHB3ENR |= QSPIEN(bit14)
    mmw 0x580244D4 0x00004000 0
    sleep 1

    # ---- GPIOB: PB2 AF9 (CLK), PB6 AF10 (NCS) ----
    # MODER:    PB2,PB6 = 10b (alternate)
    mmw 0x58020400 0x00002020 0x00001010
    # OSPEEDR:  PB2,PB6 = 11b (very high)
    mmw 0x58020408 0x00003030 0x00000000
    # AFRL:     PB2 = 9, PB6 = 0xA
    mmw 0x58020420 0x0A000900 0x0F000F00

    # ---- GPIOD: PD11/12/13 AF9 (IO0/IO1/IO3) ----
    # MODER:    bits 22-27 = 101010b
    mmw 0x58020C00 0x02A00000 0x01500000
    # OSPEEDR:  PD11/12/13 = 11b
    mmw 0x58020C08 0x03F00000 0x00000000
    # AFRH:     PD11/12/13 = 9
    mmw 0x58020C24 0x00999000 0x00FFF000

    # ---- GPIOE: PE2 AF9 (IO2) ----
    # MODER:    PE2 = 10b
    mmw 0x58021000 0x00000020 0x00000010
    # OSPEEDR:  PE2 = 11b
    mmw 0x58021008 0x00000030 0x00000000
    # AFRL:     PE2 = 9
    mmw 0x58021020 0x00000900 0x00000F00

    # ---- QUADSPI controller @ 0x52005000 ----
    # If bootloader left it running, abort first.
    mww 0x52005000 0x00000000           ;# CR: disable
    mmw 0x52005000 0x00000002 0x00000000;# CR.ABORT = 1
    sleep 1

    # CR: PRESCALER=3 (D1HCLK/4 ~= 60 MHz), FTHRES=0, SSHIFT=1, TCEN=1, EN=0
    mww 0x52005000 0x03000018
    # DCR: FSIZE=22 (8 MB), CSHT=3 (4 cycles), CKMODE=0
    mww 0x52005004 0x00160300
    # Enable
    mmw 0x52005000 0x00000001 0x00000000
}

# Run qspi_init right after reset / target halt so OpenOCD's stmqspi driver
# inherits a fully-initialized peripheral.
$_TARGETNAME configure -event reset-init {
    qspi_init
}

# stmqspi <name> <base> <size> <chip_width> <bus_width> <target> <io_base>
# size = 0 lets the driver auto-detect via SFDP.
flash bank w25q64 stmqspi 0x90000000 0 0 0 $_TARGETNAME 0x52005000

